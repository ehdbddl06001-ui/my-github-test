name: Scrape papers (daily)

# 매일 PubMed에서 관심 주제의 최신 논문을 긁어와 Markdown 카드로 커밋하고,
# 같은 실행 안에서 Google Drive 백업까지 끝낸다(자기완결형).
#
# 왜 한 워크플로 안에서 백업까지 하나?
#   GitHub Actions는 기본 GITHUB_TOKEN으로 만든 커밋(=이 봇의 push)은 다른 워크플로
#   (drive-sync.yml, pages.yml)를 다시 트리거하지 않는다(무한루프 방지 규칙).
#   그래서 논문 커밋만으로는 Drive 백업이 자동으로 안 돈다. → 여기서 직접 백업한다.
#   홈페이지 배포는 pages.yml 이 workflow_run 으로 이 워크플로 완료 후 이어받는다.
#
# 사전 준비(Drive 백업):
#   1) 로컬에서 `rclone config` 로 이름이 gdrive 인 Google Drive 원격 설정
#   2) 설정 파일을 base64로 인코딩해 GitHub repo Secret 'RCLONE_CONF_BASE64' 에 저장
#      (base64를 쓰는 이유: 토큰 JSON의 따옴표·줄바꿈이 전달 중 깨지지 않게)
#   Secret이 없으면 백업 단계는 그냥 건너뛴다(스크랩·커밋은 정상 진행).

on:
  schedule:
    - cron: "0 20 * * *"   # 매일 20:00 UTC (KST 05:00)
  workflow_dispatch:
    inputs:
      days:
        description: "최근 N일"
        default: "7"
      max:
        description: "주제당 최대 편수"
        default: "1"

permissions:
  contents: write

concurrency:
  group: scrape-papers
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Scrape PubMed → Markdown cards
        run: |
          python pipelines/scrape_papers.py \
            --days "${{ github.event.inputs.days || '7' }}" \
            --max "${{ github.event.inputs.max || '1' }}"

      - name: Validate frontmatter
        run: python pipelines/indexer.py --check

      - name: Rebuild web bundle (docs/papers.js)
        run: python pipelines/export_papers_web.py

      - name: Commit new papers
        run: |
          git config user.name  "medkos-bot"
          git config user.email "medkos-bot@users.noreply.github.com"
          git add content/papers state/seen_papers.json state/id_counter.json state/seen_topics.json docs/papers.js
          if git diff --cached --quiet; then
            echo "새 논문 없음 — 커밋 생략"
          else
            git commit -m "논문 스크랩: $(date -u +%Y-%m-%d) PubMed 최신 논문 자동 저장"
            for i in 1 2 3 4; do
              git push origin HEAD:main && break || { echo "push 실패, ${i}회차 재시도"; sleep $((2**i)); }
            done
          fi

      - name: Backup content to Google Drive
        env:
          RCLONE_CONF_BASE64: ${{ secrets.RCLONE_CONF_BASE64 }}
        run: |
          if [ -z "$RCLONE_CONF_BASE64" ]; then
            echo "RCLONE_CONF_BASE64 secret 미설정 — Google Drive 백업 건너뜀"
            exit 0
          fi
          curl https://rclone.org/install.sh | sudo bash
          mkdir -p ~/.config/rclone
          echo "$RCLONE_CONF_BASE64" | base64 -d > ~/.config/rclone/rclone.conf
          echo "rclone 원격 확인:"; rclone listremotes
          rclone sync content/ gdrive:MedKOS/content/ \
            --drive-use-trash=true --fast-list --verbose
